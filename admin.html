<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가전 제품 관리 — 소노 스마트케어</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --blue:#0039E3;--blue-light:#e8effe;--red:#FF6242;--gray:#f5f5f7;
    --dark:#1d1d1f;--border:#e0e0e0;--white:#fff;
    --radius:14px;--shadow:0 4px 24px rgba(0,0,0,0.10);
  }
  body{font-family:'Pretendard',sans-serif;background:#f0f2f5;color:var(--dark);min-height:100vh;}

  .admin-header{
    background:var(--white);border-bottom:1px solid var(--border);
    padding:0 2rem;height:60px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .admin-header h1{font-size:1rem;font-weight:700;color:var(--blue);}
  .admin-header h1 span{color:var(--dark);font-weight:400;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
  .status-dot.ok{background:#4caf50;}
  .status-dot.err{background:var(--red);}
  .status-text{font-size:0.8rem;color:#888;}

  .plan-tabs{
    display:flex;gap:0;background:var(--white);
    border-bottom:2px solid var(--border);padding:0 2rem;
  }
  .plan-tab{
    padding:14px 28px;cursor:pointer;font-size:0.95rem;font-weight:700;
    border:none;background:none;color:#888;border-bottom:3px solid transparent;
    margin-bottom:-2px;transition:all .2s;
  }
  .plan-tab.active{color:var(--blue);border-bottom-color:var(--blue);}

  .main-wrap{display:flex;gap:2rem;padding:2rem;max-width:1400px;margin:0 auto;}

  .products-section{flex:1;min-width:0;}
  .section-title{font-size:1rem;font-weight:700;margin-bottom:1rem;}
  .section-title span{font-size:0.8rem;font-weight:400;color:#888;margin-left:8px;}

  .product-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;
  }
  .prod-card{
    background:var(--white);border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow);border:2px solid transparent;
    transition:border-color .2s,transform .2s;position:relative;
  }
  .prod-card:hover{border-color:var(--blue);transform:translateY(-2px);}
  .prod-card__img{
    width:100%;aspect-ratio:1;background:#f8f8f8;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .prod-card__img img{width:100%;height:100%;object-fit:contain;padding:8px;}
  .prod-card__body{padding:10px 12px 12px;}
  .prod-card__name{font-size:0.85rem;font-weight:700;margin-bottom:4px;line-height:1.3;}
  .prod-card__full{font-size:0.7rem;color:#888;line-height:1.3;}
  .prod-card__del{
    position:absolute;top:8px;right:8px;
    width:24px;height:24px;border-radius:50%;
    background:rgba(0,0,0,.55);border:none;cursor:pointer;
    color:#fff;font-size:14px;
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;
  }
  .prod-card:hover .prod-card__del{opacity:1;}
  .prod-card__del:hover{background:var(--red);}
  .empty-msg{grid-column:1/-1;text-align:center;padding:3rem;color:#aaa;font-size:0.9rem;}
  .loading-msg{grid-column:1/-1;text-align:center;padding:3rem;color:#888;font-size:0.9rem;}

  .add-panel{
    width:300px;flex-shrink:0;
    background:var(--white);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:1.5rem;
    height:fit-content;position:sticky;top:80px;
  }
  .add-panel h2{font-size:1rem;font-weight:700;margin-bottom:1.25rem;}

  .drop-zone{
    border:2px dashed var(--border);border-radius:10px;
    padding:2rem 1rem;text-align:center;cursor:pointer;
    transition:border-color .2s,background .2s;margin-bottom:1rem;
    position:relative;
  }
  .drop-zone.drag-over{border-color:var(--blue);background:var(--blue-light);}
  .drop-zone input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
  }
  .drop-zone__icon{font-size:2rem;margin-bottom:8px;display:block;}
  .drop-zone__text{font-size:0.85rem;color:#888;line-height:1.5;}
  .drop-zone__text strong{color:var(--blue);}

  .preview-wrap{
    width:100%;aspect-ratio:1;background:#f8f8f8;border-radius:8px;
    overflow:hidden;margin-bottom:1rem;display:none;
    align-items:center;justify-content:center;
  }
  .preview-wrap.show{display:flex;}
  .preview-wrap img{max-width:100%;max-height:100%;object-fit:contain;padding:8px;}

  .form-group{margin-bottom:1rem;}
  .form-group label{font-size:0.8rem;font-weight:700;display:block;margin-bottom:6px;color:#555;}
  .form-group input{
    width:100%;padding:10px 12px;border:1.5px solid var(--border);
    border-radius:8px;font-size:0.9rem;font-family:inherit;
    outline:none;transition:border-color .2s;
  }
  .form-group input:focus{border-color:var(--blue);}
  .form-hint{font-size:0.72rem;color:#aaa;margin-top:4px;}

  .add-btn{
    width:100%;padding:12px;background:var(--blue);color:var(--white);
    border:none;border-radius:10px;font-size:0.95rem;font-weight:700;
    cursor:pointer;transition:opacity .2s;font-family:inherit;
  }
  .add-btn:hover{opacity:.85;}
  .add-btn:disabled{opacity:.4;cursor:default;}

  .upload-status{font-size:0.8rem;text-align:center;margin-top:8px;min-height:20px;color:#888;}
  .upload-status.ok{color:#4caf50;}
  .upload-status.err{color:var(--red);}

  .toast{
    position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
    background:var(--dark);color:var(--white);
    padding:12px 24px;border-radius:100px;font-size:0.9rem;font-weight:600;
    box-shadow:0 8px 32px rgba(0,0,0,.25);opacity:0;
    transition:opacity .3s;pointer-events:none;z-index:9999;
  }
  .toast.show{opacity:1;}

  @media(max-width:800px){
    .main-wrap{flex-direction:column;}
    .add-panel{width:100%;position:static;}
  }
</style>
</head>
<body>

<header class="admin-header">
  <h1>🛠 가전 관리 <span>소노 스마트케어</span></h1>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">연결 중...</span>
  </div>
</header>

<nav class="plan-tabs" id="planTabs">
  <button class="plan-tab active" data-plan="330X2">330X2</button>
  <button class="plan-tab" data-plan="330X3">330X3</button>
  <button class="plan-tab" data-plan="330X4">330X4</button>
  <button class="plan-tab" data-plan="330X6">330X6</button>
</nav>

<div class="main-wrap">
  <section class="products-section">
    <p class="section-title">등록된 가전 제품 <span id="prodCount"></span></p>
    <div class="product-grid" id="productGrid">
      <p class="loading-msg">⏳ 데이터 불러오는 중...</p>
    </div>
  </section>

  <aside class="add-panel">
    <h2>➕ 새 제품 추가</h2>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*">
      <span class="drop-zone__icon">🖼️</span>
      <p class="drop-zone__text">
        <strong>클릭 또는 드래그앤드롭</strong><br>
        이미지를 여기에 올려주세요<br>
        <small style="color:#bbb">(jpg, png, avif, webp 등)</small>
      </p>
    </div>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="미리보기">
    </div>
    <p class="upload-status" id="uploadStatus"></p>

    <div class="form-group">
      <label>짧은 이름 (카드에 표시)</label>
      <input type="text" id="inputName" placeholder="예: LG 공기청정기">
      <p class="form-hint">카드 하단에 표시될 짧은 이름</p>
    </div>
    <div class="form-group">
      <label>전체 모델명 (선택사항)</label>
      <input type="text" id="inputFullName" placeholder="예: LG 퓨리케어 공기청정기 (AS305DWWA)">
    </div>

    <button class="add-btn" id="addBtn" disabled>이미지를 먼저 업로드하세요</button>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase 연결 설정 ─────────────────────────────────────
const SUPABASE_URL = 'https://rbliwhiibewihqlpmihd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_n0rEJFTn6Qu12Ui_qDO8bw_sSVJbTR-';
const BUCKET = 'product-images';
const TABLE  = 'products';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── 상태 ──────────────────────────────────────────────────
let currentPlan = '330X2';
let uploadedUrl = '';

// ── 연결 상태 표시 ─────────────────────────────────────────
function setStatus(ok, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('statusText').textContent = msg;
}

// ── 제품 목록 로드 ─────────────────────────────────────────
async function loadProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '<p class="loading-msg">⏳ 불러오는 중...</p>';

  const { data, error } = await db
    .from(TABLE)
    .select('*')
    .eq('plan', currentPlan)
    .order('sort_order', { ascending: true })
    .order('created_at', { ascending: true });

  if (error) {
    setStatus(false, '연결 오류: ' + error.message);
    grid.innerHTML = '<p class="empty-msg">❌ 데이터를 불러올 수 없습니다.<br>' + error.message + '</p>';
    return;
  }

  setStatus(true, 'Supabase 연결됨');
  document.getElementById('prodCount').textContent = `(${data.length}개)`;

  if (!data.length) {
    grid.innerHTML = '<p class="empty-msg">등록된 제품이 없습니다.<br>오른쪽에서 추가해주세요.</p>';
    return;
  }

  grid.innerHTML = data.map(p => `
    <div class="prod-card">
      <div class="prod-card__img">
        <img src="${p.img_url}" alt="${p.name}"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2260%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2240%22>📦</text></svg>'">
      </div>
      <div class="prod-card__body">
        <p class="prod-card__name">${p.name}</p>
        <p class="prod-card__full">${p.full_name || ''}</p>
      </div>
      <button class="prod-card__del" onclick="deleteProduct(${p.id})" title="삭제">✕</button>
    </div>
  `).join('');
}

// ── 플랜 탭 전환 ──────────────────────────────────────────
document.getElementById('planTabs').addEventListener('click', e => {
  const tab = e.target.closest('.plan-tab');
  if (!tab) return;
  document.querySelectorAll('.plan-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentPlan = tab.dataset.plan;
  loadProducts();
});

// ── 이미지 업로드 ─────────────────────────────────────────
const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const statusEl   = document.getElementById('uploadStatus');
const previewWrap = document.getElementById('previewWrap');
const previewImg  = document.getElementById('previewImg');
const addBtn      = document.getElementById('addBtn');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

async function uploadFile(file) {
  if (!file.type.startsWith('image/')) { setUploadStatus('이미지 파일만 가능합니다.', 'err'); return; }
  setUploadStatus('⏫ 업로드 중...', '');
  addBtn.disabled = true;

  // 로컬 미리보기
  const reader = new FileReader();
  reader.onload = e => { previewImg.src = e.target.result; previewWrap.classList.add('show'); };
  reader.readAsDataURL(file);

  // 파일명: 타임스탬프 + 원본명 (중복 방지)
  const ext = file.name.split('.').pop();
  const safeName = `${Date.now()}.${ext}`;

  const { data, error } = await db.storage
    .from(BUCKET)
    .upload(safeName, file, { upsert: false });

  if (error) {
    setUploadStatus('❌ 업로드 실패: ' + error.message, 'err');
    return;
  }

  // 공개 URL 생성
  const { data: urlData } = db.storage.from(BUCKET).getPublicUrl(safeName);
  uploadedUrl = urlData.publicUrl;

  setUploadStatus('✅ 업로드 완료!', 'ok');
  addBtn.disabled = false;
  addBtn.textContent = '제품 추가하기';
}

function setUploadStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'upload-status ' + type;
}

// ── 제품 추가 ────────────────────────────────────────────
addBtn.addEventListener('click', async () => {
  const name     = document.getElementById('inputName').value.trim();
  const fullName = document.getElementById('inputFullName').value.trim();
  if (!name) { showToast('❗ 짧은 이름을 입력하세요.'); return; }
  if (!uploadedUrl) { showToast('❗ 이미지를 먼저 업로드하세요.'); return; }

  addBtn.disabled = true;
  addBtn.textContent = '저장 중...';

  const { error } = await db.from(TABLE).insert({
    plan: currentPlan,
    name,
    full_name: fullName || name,
    img_url: uploadedUrl,
    sort_order: 0
  });

  if (error) {
    showToast('❌ 저장 실패: ' + error.message);
    addBtn.disabled = false;
    addBtn.textContent = '제품 추가하기';
    return;
  }

  // 폼 초기화
  document.getElementById('inputName').value = '';
  document.getElementById('inputFullName').value = '';
  uploadedUrl = '';
  previewWrap.classList.remove('show');
  previewImg.src = '';
  addBtn.disabled = true;
  addBtn.textContent = '이미지를 먼저 업로드하세요';
  setUploadStatus('', '');
  fileInput.value = '';

  showToast('✅ 제품이 추가됐습니다!');
  loadProducts();
});

// ── 제품 삭제 ────────────────────────────────────────────
window.deleteProduct = async function(id) {
  if (!confirm('이 제품을 삭제할까요?')) return;
  const { error } = await db.from(TABLE).delete().eq('id', id);
  if (error) { showToast('❌ 삭제 실패: ' + error.message); return; }
  showToast('🗑 삭제됐습니다.');
  loadProducts();
};

// ── 토스트 ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── 초기 로드 ────────────────────────────────────────────
loadProducts();
</script>
</body>
</html>
